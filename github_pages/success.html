<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了 | 株式会社Showtime</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Noto Sans JP",sans-serif; background:#0d1a2e; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:#fff; border-radius:16px; padding:48px 40px; text-align:center; max-width:480px; width:90%; }
.triangle { width:0; height:0; border-left:24px solid transparent; border-right:24px solid transparent; border-bottom:42px solid #f5c518; margin:0 auto 24px; }
h1 { font-size:22px; font-weight:700; color:#0d1a2e; margin-bottom:12px; }
p { font-size:14px; color:#6b7280; line-height:1.8; margin-bottom:28px; }
a { display:inline-block; background:#f5c518; color:#111; font-weight:700; font-size:14px; padding:12px 28px; border-radius:8px; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="triangle"></div>
  <h1>送信しました！</h1>
  <p>お問い合わせありがとうございます。<br>内容を確認後、2営業日以内にご連絡いたします。</p>
  <a href="/">トップページへ戻る</a>
</div>
</body>
</html>
